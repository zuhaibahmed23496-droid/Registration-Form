<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    
    fieldset {
      border: 4px solid tomato; 
      background-color: pink; 
      color: #333;
      border-radius: 10px;
      max-width: 600px; /* Bara screen pe limit */
      margin: 0 auto; /* Center */
      padding: 20px;
    }
    
    legend {
      color: black;
      font-size: 21px;
      font-weight: bold;
      padding: 0 10px;
    }

    h1 {
      color: blue;
      text-align: center;
      margin-top: 0;
    }

    .form-group {
      display: flex;
      flex-direction: column; /* Mobile: Label upar, Input neeche */
      gap: 5px;
      margin-bottom: 15px;
    }

    input, select, textarea {
      width: 100%; /* Pura space le lo */
      padding: 8px;
      box-sizing: border-box; /* Border andar rahe */
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .radio-group {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      color: blue;
      height: 40px;
      width: 100px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: white;
    }
    button[type="submit"] { color: blue; }

    /* PC/Laptop: Jab screen 600px se bari ho */
    @media (min-width: 600px) {
      .form-group {
        flex-direction: row; /* Label left, Input right */
        align-items: center;
      }
      .form-group label:first-child {
        width: 120px; /* Label ki fixed width */
        flex-shrink: 0;
      }
      input, select, textarea {
        flex: 1; /* Bacha hua space input le */
      }
    }
  </style>
</head>
<body>
  <hr width="700">
  <form>
    <fieldset>
      <legend>INFORMATION</legend>
      
      <h1 <marquee>Registration Form</marquee></h1>

      <div class="form-group">
        <label><b>Name:</b></label> 
        <input type="text" placeholder="Enter Your Name" required>
      </div>

      <div class="form-group">
        <label><b>Age:</b></label> 
        <input type="number" placeholder="Enter Your Age" required>
      </div>

      <div class="form-group">
        <label><b>Date Of Birth:</b></label>
        <input type="date" required>
      </div>

      <div class="form-group">
        <label><b>Gender:</b></label>
        <div class="radio-group">
          <label><input type="radio" id="Male" name="Gender"> Male</label>
          <label><input type="radio" id="Female" name="Gender"> Female</label>
        </div>
      </div>

      <div class="form-group">
        <label><b>Course:</b></label>
        <select required>
          <option>Choose Course</option>
          <option>AI</option>
          <option>Trading</option>
          <option>CIT</option>
          <option>DIT</option>
          <option>Digital Marketing</option>
        </select>
      </div>

      <div class="form-group">
        <label><b>Email:</b></label> 
        <input type="email" placeholder="example@gmail.com" required>
      </div>

      <div class="form-group">
        <label><b>Mobile Number:</b></label>
        <input type="tel" placeholder="+92" required>
      </div>

      <div class="form-group">
        <label><b>Address:</b></label>
        <textarea rows="4" required></textarea>
      </div>

      <div class="btn-group">
  <button>Submit</button>
        <button type="reset">Reset</button>
      </div>
    </fieldset>
  </form>
  <hr width="700" >
  
</body>
</html>
